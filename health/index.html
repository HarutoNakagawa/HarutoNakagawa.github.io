<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --card: #f0f0f0;
      --card2: #e8e8e8;
      --border: #d8d8d8;
      --accent: #111111;
      --mid: #444444;
      --muted: #888888;
      --dim: #bbbbbb;
      --text: #111111;
      --white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      padding-top: 56px;
      padding-bottom: 68px;
    }
    .page { max-width: 960px; margin: 0 auto; padding: 40px 24px 100px; }

    /* HERO */
    .hero {
      background: var(--accent); color: var(--white);
      border-radius: 16px; padding: 36px 40px 32px;
      margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .hero::after {
      content: ''; position: absolute; bottom: -40px; right: -40px;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,255,255,.04); pointer-events: none;
    }
    .hero-tag {
      font-family: 'Poppins', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,.45); margin-bottom: 12px;
    }
    .hero h1 {
      font-family: 'Poppins', sans-serif; font-size: 2rem; font-weight: 800;
      letter-spacing: -.02em; line-height: 1.2; margin-bottom: 8px;
    }
    .hero-sub {
      font-size: .85rem; color: rgba(255,255,255,.55);
      font-family: 'Poppins', sans-serif; margin-bottom: 24px;
    }
    .kpi-row {
      display: flex; gap: 28px; flex-wrap: wrap;
      padding-top: 18px; border-top: 1px solid rgba(255,255,255,.15);
    }
    .kpi .val {
      font-family: 'Poppins', sans-serif; font-size: 1.45rem; font-weight: 800;
      color: #fff; line-height: 1; margin-bottom: 3px;
    }
    .kpi .val .delta { font-size: .72rem; font-weight: 600; margin-left: 5px; opacity: .65; }
    .kpi .lbl {
      font-size: 9px; color: rgba(255,255,255,.4);
      letter-spacing: .08em; text-transform: uppercase;
      font-family: 'Poppins', sans-serif;
    }

    /* TABS */
    .tabs-bar {
      display: flex; border-bottom: 1px solid var(--border);
      margin-bottom: 32px; position: sticky; top: 0;
      background: var(--bg); z-index: 10; padding-top: 8px;
    }
    .tab-btn {
      font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .1em; padding: 10px 22px;
      border: none; background: none; cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

    /* CHART GRID */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .chart-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px 14px;
      cursor: pointer; transition: box-shadow .15s;
    }
    .chart-box:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .chart-box-wide { grid-column: 1 / -1; }
    .chart-title {
      font-family: 'Poppins', sans-serif; font-size: 9.5px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 14px;
    }
    .chart-target-note { font-size: 9.5px; color: var(--dim); font-family: 'Poppins', sans-serif; margin-top: 8px; }

    /* TABLES */
    .tbl-section { margin-bottom: 40px; }
    .sec-label {
      font-family: 'Poppins', sans-serif; font-size: 10px; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .12em;
      margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
    }
    .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.raw { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 640px; }
    table.raw th {
      background: var(--card2); color: var(--mid);
      font-family: 'Poppins', sans-serif; font-size: 8.5px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      padding: 8px 12px; text-align: right;
      border-bottom: 2px solid var(--accent); white-space: nowrap;
    }
    table.raw th:first-child { text-align: left; position: sticky; left: 0; background: var(--card2); }
    table.raw td {
      padding: 7px 12px; border-bottom: 1px solid var(--border);
      text-align: right; color: var(--text);
      font-family: 'Poppins', sans-serif; white-space: nowrap;
    }
    table.raw td:first-child { text-align: left; color: var(--mid); font-size: 11px; position: sticky; left: 0; background: var(--bg); }
    table.raw tr.latest td { background: var(--surface); font-weight: 600; }
    table.raw tr.latest td:first-child { background: var(--surface); }
    table.raw tr:hover td { background: var(--surface); }
    table.raw tr:hover td:first-child { background: var(--surface); }
    table.raw tr:last-child td { border-bottom: none; }
    table.raw tr.goal-row td { color: var(--dim); font-size: 11px; font-style: italic; border-bottom: 2px dashed var(--border); }
    table.raw tr.goal-row td:first-child { background: var(--bg); }

    /* MODAL */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.55); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: var(--bg); border-radius: 16px; padding: 28px 28px 20px;
      width: min(800px, 100%); max-height: 90vh; overflow-y: auto; position: relative;
    }
    #modal-close {
      position: absolute; top: 16px; right: 18px;
      background: none; border: none; cursor: pointer;
      font-size: 20px; color: var(--muted); line-height: 1;
      font-family: 'Poppins', sans-serif;
    }
    #modal-close:hover { color: var(--accent); }
    #modal-title {
      font-family: 'Poppins', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px;
    }

    /* NAVBAR */
    .snav {
      position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #111;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; z-index: 9999; font-family: 'Poppins', sans-serif;
    }
    .snav-logo { color: #fff; text-decoration: none; font-size: 13px; font-weight: 700; letter-spacing: .02em; transition: opacity .15s; }
    .snav-logo:hover { opacity: .6; }
    .snav-btn { background: none; border: none; cursor: pointer; padding: 6px; display: flex; flex-direction: column; gap: 5px; }
    .snav-btn span { display: block; width: 20px; height: 1.5px; background: #fff; transition: all .2s ease; }
    .snav-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .snav-btn.open span:nth-child(2) { opacity: 0; }
    .snav-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .snav-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 9998; cursor: pointer; }
    .snav-overlay.open { display: block; }
    .snav-panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: 260px; background: #111;
      z-index: 9999; transform: translateX(100%); transition: transform .25s ease;
      padding: 68px 32px 72px; font-family: 'Poppins', sans-serif; overflow-y: auto;
    }
    .snav-panel.open { transform: translateX(0); }
    .snav-sec { margin-bottom: 28px; }
    .snav-sec-label { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.28); margin-bottom: 8px; }
    .snav-a { display: block; color: rgba(255,255,255,.8); text-decoration: none; font-size: 13px; font-weight: 600; padding: 5px 0; letter-spacing: -.01em; transition: color .12s; }
    .snav-a:hover { color: #fff; }

    /* FOOTER */
    .snav-footer {
      position: fixed; bottom: 0; left: 0; right: 0; height: 62px; background: #111;
      border-top: 1px solid #222; display: flex; align-items: center; justify-content: center;
      padding: 0 28px; font-family: 'Poppins', sans-serif; z-index: 9997;
    }
    .snav-footer-sns { display: flex; gap: 20px; }
    .snav-footer-sns a { color: rgba(255,255,255,.4); text-decoration: none; font-size: 11px; font-weight: 500; letter-spacing: .06em; transition: color .15s; }
    .snav-footer-sns a:hover { color: rgba(255,255,255,.9); }

    @media (max-width: 640px) {
      .chart-grid { grid-template-columns: 1fr; }
      .chart-box-wide { grid-column: 1; }
      .hero { padding: 24px 20px; }
      .hero h1 { font-size: 1.5rem; }
      .kpi-row { gap: 16px; }
      .page { padding: 24px 16px 80px; }
    }
  </style>
</head>
<body>

<nav class="snav">
  <a href="/index.html" class="snav-logo">HarutoNakagawa</a>
  <button class="snav-btn" id="snavBtn" onclick="snavToggle()">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="snav-overlay" id="snavOverlay" onclick="snavToggle()"></div>
<div class="snav-panel" id="snavPanel">
  <div class="snav-sec">
    <div class="snav-sec-label">main</div>
    <a href="/index.html" class="snav-a">home</a>
  </div>
  <div class="snav-sec">
    <div class="snav-sec-label">personal</div>
    <a href="/health/" class="snav-a">health</a>
  </div>
</div>

<footer class="snav-footer">
  <div class="snav-footer-sns">
    <a href="https://github.com/HarutoNakagawa" target="_blank">GitHub</a>
  </div>
</footer>

<div class="page">
  <div class="hero">
    <div class="hero-tag">personal / health</div>
    <h1>Health Dashboard</h1>
    <div class="hero-sub">体組成 · カロリー推移 — 筋肉増量モード</div>
    <div class="kpi-row" id="kpi-row"></div>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('chart', this)">グラフ</button>
    <button class="tab-btn" onclick="switchTab('table', this)">Raw Data</button>
  </div>

  <div id="panel-chart">
    <div class="chart-grid">
      <div class="chart-box" onclick="openModal('c-weight')">
        <div class="chart-title">体重 (kg)</div>
        <canvas id="c-weight"></canvas>
        <div class="chart-target-note">目標 71.0 kg</div>
      </div>
      <div class="chart-box" onclick="openModal('c-fat')">
        <div class="chart-title">体脂肪率 (%)</div>
        <canvas id="c-fat"></canvas>
        <div class="chart-target-note">目標 15.0 %</div>
      </div>
      <div class="chart-box" onclick="openModal('c-visceral')">
        <div class="chart-title">内臓脂肪レベル</div>
        <canvas id="c-visceral"></canvas>
        <div class="chart-target-note">目標 6</div>
      </div>
      <div class="chart-box" onclick="openModal('c-water')">
        <div class="chart-title">体水分率 (%)</div>
        <canvas id="c-water"></canvas>
        <div class="chart-target-note">目標 60.0 %</div>
      </div>
      <div class="chart-box chart-box-wide" onclick="openModal('c-calories')">
        <div class="chart-title">摂取カロリー (kcal)</div>
        <canvas id="c-calories"></canvas>
        <div class="chart-target-note">目標 2,300 kcal/day（筋肉増量）</div>
      </div>
      <div class="chart-box" onclick="openModal('c-protein')">
        <div class="chart-title">タンパク質 (g)</div>
        <canvas id="c-protein"></canvas>
        <div class="chart-target-note">目標 140 g（体重×2g/kg）</div>
      </div>
      <div class="chart-box" onclick="openModal('c-fat-cal')">
        <div class="chart-title">脂質 (g)</div>
        <canvas id="c-fat-cal"></canvas>
      </div>
      <div class="chart-box" onclick="openModal('c-carbs')">
        <div class="chart-title">炭水化物 (g)</div>
        <canvas id="c-carbs"></canvas>
      </div>
    </div>
  </div>

  <div id="panel-table" style="display:none;">
    <div class="tbl-section">
      <div class="sec-label">体組成</div>
      <div class="table-wrap" id="tbl-body"></div>
    </div>
    <div class="tbl-section">
      <div class="sec-label">カロリー記録</div>
      <div class="table-wrap" id="tbl-cal"></div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-title"></div>
    <div id="modal-note" class="chart-target-note"></div>
    <canvas id="modal-canvas" style="margin-top:16px;"></canvas>
  </div>
</div>

<script>
function snavToggle() {
  document.getElementById('snavBtn').classList.toggle('open');
  document.getElementById('snavPanel').classList.toggle('open');
  document.getElementById('snavOverlay').classList.toggle('open');
}

// ── CONFIG ────────────────────────────────────────────────────
const GOALS = {
  weight: 71.0,       // 筋肉増量目標
  body_fat: 15.0,
  visceral_fat: 6,
  body_water: 60.0,
  calories: 2300,     // 増量期カロリー
  protein: 140,       // 体重×2g/kg
  fat: 70,
  carbs: 280,
};

const BODY_COLS = [
  { key: 'weight',       label: 'Weight (kg)',   goal: GOALS.weight },
  { key: 'body_fat',     label: 'BodyFat (%)',    goal: GOALS.body_fat },
  { key: 'visceral_fat', label: 'VisceralFat',    goal: GOALS.visceral_fat },
  { key: 'body_water',   label: 'BodyWater (%)',  goal: GOALS.body_water },
  { key: 'bmi',          label: 'BMI',            goal: null },
];

const CAL_COLS = [
  { key: 'calories', label: 'Calories (kcal)', goal: GOALS.calories },
  { key: 'protein',  label: 'Protein (g)',     goal: GOALS.protein },
  { key: 'fat',      label: 'Fat (g)',         goal: null },
  { key: 'carbs',    label: 'Carbs (g)',       goal: null },
];

Chart.defaults.font.family = "'Poppins', sans-serif";
Chart.defaults.font.size = 10;
Chart.defaults.color = '#888';

// ── DATA ─────────────────────────────────────────────────────
// 体組成データ — 毎日1行追加してください
const BODY_CSV = `date,weight,body_fat,visceral_fat,body_water,bmi
2026-04-20,66.8,18.0,7,58.5,21.3`;

// カロリーデータ — 食事のたびに合計を更新してください
// ※ 朝食のみ：バナナ1本 + プロテイン(P21g)
const CAL_CSV = `date,calories,protein,fat,carbs
2026-04-20,199,22,2,27`;

// ── STATE ─────────────────────────────────────────────────────
let bodyData = [], calData = [];
const charts = {}, chartDefs = {};

function loadData() {
  bodyData = Papa.parse(BODY_CSV, { header: true, skipEmptyLines: true })
    .data.sort((a, b) => new Date(a.date) - new Date(b.date));
  calData = Papa.parse(CAL_CSV, { header: true, skipEmptyLines: true })
    .data.sort((a, b) => new Date(a.date) - new Date(b.date));
  renderKPIs();
  renderCharts();
  renderTables();
}

// ── KPIs ──────────────────────────────────────────────────────
function renderKPIs() {
  if (!bodyData.length) return;
  const latest = bodyData[bodyData.length - 1];
  const prev = bodyData.length > 1 ? bodyData[bodyData.length - 2] : null;
  const kpis = [
    { key: 'weight',       label: 'Weight (kg)',  fmt: v => v.toFixed(1) },
    { key: 'body_fat',     label: 'Body Fat (%)', fmt: v => v.toFixed(1) + '%' },
    { key: 'visceral_fat', label: 'Visceral Fat', fmt: v => v.toFixed(0) },
    { key: 'bmi',          label: 'BMI',          fmt: v => v.toFixed(1) },
  ];
  document.getElementById('kpi-row').innerHTML = kpis.map(k => {
    const val = parseFloat(latest[k.key]);
    let deltaStr = '';
    if (prev) {
      const d = val - parseFloat(prev[k.key]);
      if (!isNaN(d) && d !== 0)
        deltaStr = `<span class="delta">${d > 0 ? '+' : ''}${d.toFixed(1)}</span>`;
    }
    return `<div class="kpi">
      <div class="val">${isNaN(val) ? '—' : k.fmt(val)}${deltaStr}</div>
      <div class="lbl">${k.label}</div>
    </div>`;
  }).join('');
}

// ── CHARTS ────────────────────────────────────────────────────
function fmtLabels(dates) {
  return dates.map((d, i) => {
    const [y, m, day] = d.split('-');
    const label = `${m}/${day}`;
    if (i === 0 || y !== dates[i - 1].split('-')[0]) return `'${y.slice(2)} ${label}`;
    return label;
  });
}

function fv(arr, key) {
  return arr.map(d => { const v = parseFloat(d[key]); return isNaN(v) ? null : v; });
}

function mkLineConfig(values, dates, goal, yMin, yMax) {
  const datasets = [{
    data: values,
    borderColor: '#111', backgroundColor: 'rgba(17,17,17,0.05)',
    tension: 0.35, pointRadius: 4,
    pointBackgroundColor: '#111', pointBorderColor: '#fff', pointBorderWidth: 1.5,
    fill: true,
  }];
  if (goal != null) {
    datasets.push({
      data: Array(dates.length).fill(goal),
      borderColor: '#bbb', borderDash: [5, 4],
      borderWidth: 1.5, pointRadius: 0, fill: false,
    });
  }
  return {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: item => item.datasetIndex === 1 ? `目標: ${goal}` : item.formattedValue } },
      },
      scales: {
        x: { ticks: { maxTicksLimit: 8 }, grid: { color: '#f0f0f0' } },
        y: { min: yMin, max: yMax, grid: { color: '#f0f0f0' } },
      },
    },
  };
}

function mkBarConfig(values, dates, target) {
  return {
    type: 'bar',
    data: {
      labels: dates,
      datasets: [{
        data: values,
        backgroundColor: values.map(v => v > target ? 'rgba(17,17,17,0.75)' : 'rgba(17,17,17,0.35)'),
        borderRadius: 4,
      }, {
        type: 'line',
        data: Array(dates.length).fill(target),
        borderColor: '#bbb', borderDash: [5, 4],
        borderWidth: 1.5, pointRadius: 0, fill: false,
      }],
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 12 }, grid: { display: false } },
        y: { grid: { color: '#f0f0f0' } },
      },
    },
  };
}

function mkLine(id, values, dates, goal, yMin, yMax, title, note) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (charts[id]) charts[id].destroy();
  const cfg = mkLineConfig(values, dates, goal, yMin, yMax);
  charts[id] = new Chart(ctx, cfg);
  chartDefs[id] = { config: cfg, title, note };
}

function mkBar(id, values, dates, target, title, note) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (charts[id]) charts[id].destroy();
  const cfg = mkBarConfig(values, dates, target);
  charts[id] = new Chart(ctx, cfg);
  chartDefs[id] = { config: cfg, title, note };
}

function renderCharts() {
  const bd = fmtLabels(bodyData.map(d => d.date));
  mkLine('c-weight',   fv(bodyData, 'weight'),      bd, GOALS.weight,      60, 80, '体重 (kg)',      '目標 71.0 kg');
  mkLine('c-fat',      fv(bodyData, 'body_fat'),     bd, GOALS.body_fat,    10, 25, '体脂肪率 (%)',   '目標 15.0 %');
  mkLine('c-visceral', fv(bodyData, 'visceral_fat'), bd, GOALS.visceral_fat, 0, 15, '内臓脂肪レベル', '目標 6');
  mkLine('c-water',    fv(bodyData, 'body_water'),   bd, GOALS.body_water,  50, 65, '体水分率 (%)',   '目標 60.0 %');
  if (calData.length) {
    const cd = fmtLabels(calData.map(d => d.date));
    mkBar( 'c-calories', fv(calData, 'calories'), cd, GOALS.calories, '摂取カロリー (kcal)', '目標 2,300 kcal/day');
    mkLine('c-protein',  fv(calData, 'protein'),  cd, GOALS.protein,  0, 200, 'タンパク質 (g)', '目標 140 g');
    mkLine('c-fat-cal',  fv(calData, 'fat'),      cd, null,           0, 150, '脂質 (g)', '');
    mkLine('c-carbs',    fv(calData, 'carbs'),    cd, null,           0, 400, '炭水化物 (g)', '');
  }
}

// ── TABLES ────────────────────────────────────────────────────
function renderTable(containerId, data, cols) {
  const el = document.getElementById(containerId);
  if (!data.length) { el.innerHTML = '<div style="padding:32px;text-align:center;color:#888;">データなし</div>'; return; }
  const goalRow = `<tr class="goal-row"><td>目標</td>${cols.map(c => `<td>${c.goal != null ? c.goal : '—'}</td>`).join('')}</tr>`;
  const rows = [...data].reverse().map((row, i) =>
    `<tr class="${i === 0 ? 'latest' : ''}"><td>${row.date}</td>${cols.map(c => `<td>${row[c.key] !== undefined && row[c.key] !== '' ? row[c.key] : '—'}</td>`).join('')}</tr>`
  ).join('');
  el.innerHTML = `<table class="raw"><thead><tr><th>Date</th>${cols.map(c => `<th>${c.label}</th>`).join('')}</tr></thead><tbody>${goalRow}${rows}</tbody></table>`;
}

function renderTables() {
  renderTable('tbl-body', bodyData, BODY_COLS);
  renderTable('tbl-cal',  calData,  CAL_COLS);
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.getElementById('panel-chart').style.display = name === 'chart' ? '' : 'none';
  document.getElementById('panel-table').style.display = name === 'table' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── MODAL ─────────────────────────────────────────────────────
let modalChart = null;
function openModal(id) {
  const def = chartDefs[id];
  if (!def) return;
  document.getElementById('modal-title').textContent = def.title;
  document.getElementById('modal-note').textContent = def.note || '';
  if (modalChart) { modalChart.destroy(); modalChart = null; }
  const canvas = document.getElementById('modal-canvas');
  canvas.style.maxHeight = '60vh';
  modalChart = new Chart(canvas, JSON.parse(JSON.stringify(def.config)));
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  if (modalChart) { modalChart.destroy(); modalChart = null; }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadData();
</script>
</body>
</html>
